name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: codeberg-small
    container:
      image: catthehacker/ubuntu:act-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-pytest python3-gi python3-gi-cairo \
            meson ninja-build blueprint-compiler \
            libgtk-4-dev libadwaita-1-dev libsoup-3.0-dev \
            libgirepository1.0-dev pkg-config \
            gettext appstream desktop-file-utils \
            gir1.2-secret-1 gir1.2-soup-3.0

      - name: Configure
        run: meson setup _build

      - name: Build
        run: meson compile -C _build

      - name: Test
        run: meson test -C _build --print-errorlogs
